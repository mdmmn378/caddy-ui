# https://taskfile.dev
version: '3'

vars:
  PM: bun
  IMAGE: mdmmn378/caddy-ui
  PLATFORMS: linux/amd64,linux/arm64

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies and git hooks
    cmds:
      - '{{.PM}} install'
      - task: hooks:install

  install:
    desc: Install dependencies
    cmds:
      - '{{.PM}} install'

  dev:
    desc: Start the dev server
    cmds:
      - '{{.PM}} run dev'

  build:
    desc: Build for production
    cmds:
      - '{{.PM}} run build'

  preview:
    desc: Preview the production build
    cmds:
      - '{{.PM}} run preview'

  prepare:
    desc: Generate Nuxt types (.nuxt)
    cmds:
      - '{{.PM}} run postinstall'

  typecheck:
    desc: Run the TypeScript type checker
    deps: [prepare]
    cmds:
      - '{{.PM}} run typecheck'

  lint:
    desc: Lint the codebase
    deps: [prepare]
    cmds:
      - '{{.PM}} run lint'

  lint:fix:
    desc: Lint and auto-fix
    deps: [prepare]
    cmds:
      - '{{.PM}} run lint:fix'

  format:
    desc: Format the codebase with Prettier
    cmds:
      - '{{.PM}} run format'

  format:check:
    desc: Check formatting without writing
    cmds:
      - '{{.PM}} run format:check'

  check:
    desc: Run all quality gates (format, lint, typecheck)
    deps: [prepare]
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck

  hooks:install:
    desc: Install lefthook git hooks
    cmds:
      - '{{.PM}}x lefthook install'

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - rm -rf .nuxt .output .nitro .cache dist node_modules/.cache

  docker:login:
    desc: Log in to Docker Hub
    cmds:
      - 'docker login -u {{.IMAGE | splitList "/" | first}}'

  docker:build:
    desc: 'Build the Docker image locally (current arch). Override tag: TAG=v1.2.3'
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - 'docker build -t {{.IMAGE}}:{{.TAG}} .'

  docker:push:
    desc: 'Build a multi-arch image and push it to Docker Hub (tags: latest + short SHA)'
    vars:
      TAG: '{{.TAG | default "latest"}}'
      SHA:
        sh: git rev-parse --short HEAD 2>/dev/null || echo local
    cmds:
      # Ensure a Buildx builder capable of multi-platform builds exists.
      - docker buildx inspect caddy-ui-builder >/dev/null 2>&1 || docker buildx create --name caddy-ui-builder --driver docker-container
      - 'docker buildx build --builder caddy-ui-builder --platform {{.PLATFORMS}} -t {{.IMAGE}}:{{.TAG}} -t {{.IMAGE}}:{{.SHA}} --push .'
