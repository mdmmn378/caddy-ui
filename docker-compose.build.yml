# Build the caddy-ui image from local source instead of pulling the published
# one. Layer it on top of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
#
services:
  caddy-ui:
    build:
      context: .
    image: ${CADDY_UI_IMAGE:-mdmmn378/caddy-ui:latest}
