# https://lefthook.dev
pre-commit:
  parallel: true
  commands:
    eslint:
      glob: '*.{js,ts,vue,mjs,cjs}'
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      glob: '*.{js,ts,vue,mjs,cjs,json,css,md,yml,yaml}'
      run: bunx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: bun run typecheck
