# Runs ONLY the Caddy UI, on the host network.
#
#   docker compose up
#
# Host networking means the container shares the host's network namespace, so:
#   - it reaches a Caddy already running on the host at http://localhost:2019
#   - the UI binds directly to host port 2020 (no port mapping)
#
# Open http://localhost:2020. Pulls the prebuilt public image — nothing to build.
#
# Overrides (env vars):
#   UI_PORT          host port the UI binds         (default 2020)
#   CADDY_ADMIN_URL  Caddy admin endpoint           (default http://localhost:2019)
#   CADDY_UI_IMAGE   image/tag to run               (default mdmmn378/caddy-ui:latest)
#
# NOTE: network_mode: host is a Linux feature. Build from source with:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build

services:
  caddy-ui:
    image: ${CADDY_UI_IMAGE:-mdmmn378/caddy-ui:latest}
    container_name: caddy-ui
    restart: unless-stopped
    network_mode: host
    environment:
      # With host networking, the host's Caddy is reachable at localhost.
      NUXT_CADDY_ADMIN_URL: ${CADDY_ADMIN_URL:-http://localhost:2019}
      NUXT_PUBLIC_APP_NAME: ${APP_NAME:-Caddy UI}
      # Nitro binds this port directly on the host (no published-ports mapping).
      NITRO_PORT: ${UI_PORT:-2020}
      NITRO_HOST: 0.0.0.0
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://localhost:'+(process.env.NITRO_PORT||2020)+'/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
